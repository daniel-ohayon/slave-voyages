<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <!-- bowsprit -->
  <line x1="48" y1="106" x2="10" y2="82" stroke="#2a1a0a" stroke-width="3" stroke-linecap="round"/>
  <!-- jib -->
  <path d="M 13,84 L 48,68 L 48,104 Z" fill="#f5ecd7" stroke="#c9b88f" stroke-width="1"/>
  <!-- foremast (square-rigged) -->
  <line x1="88" y1="108" x2="88" y2="28" stroke="#2a1a0a" stroke-width="4" stroke-linecap="round"/>
  <!-- mainmast (gaff) -->
  <line x1="155" y1="108" x2="155" y2="40" stroke="#2a1a0a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- foremast upper square sail -->
  <path d="M 68,46 Q 88,51 108,46 L 108,70 Q 88,76 68,70 Z" fill="#f5ecd7" stroke="#c9b88f" stroke-width="1"/>
  <!-- foremast lower square sail -->
  <path d="M 71,75 Q 88,80 105,75 L 105,102 Q 88,108 71,102 Z" fill="#efe4c9" stroke="#c9b88f" stroke-width="1"/>
  <!-- mainmast gaff sail -->
  <path d="M 122,56 L 188,48 L 184,106 L 122,108 Z" fill="#f5ecd7" stroke="#c9b88f" stroke-width="1"/>
  <!-- gaff boom -->
  <line x1="122" y1="56" x2="190" y2="48" stroke="#2a1a0a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- foremast yard -->
  <line x1="66" y1="45" x2="110" y2="45" stroke="#2a1a0a" stroke-width="1.5"/>
  <!-- pennant (blue) -->
  <path d="M 88,28 L 108,32 L 88,36 Z" fill="#2d5a8e"/>
  <!-- hull: near-black tarred -->
  <path d="M 40,106 L 200,106 L 190,130 Q 118,144 52,130 Z" fill="#3d2010" stroke="#2a1a0a" stroke-width="1.5"/>
  <!-- hull stripe: orange-red -->
  <path d="M 44,113 Q 118,121 194,113" fill="none" stroke="#c87941" stroke-width="2"/>
</svg>
