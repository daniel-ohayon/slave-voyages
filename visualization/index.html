<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>French Slave Voyages 1710–1868</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d14;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    #ship-canvas {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 500;
    }

    /* ── Overlays ── */
    .panel {
      position: fixed;
      z-index: 1000;
      background: rgba(8, 8, 18, 0.75);
      backdrop-filter: blur(6px);
      color: #f0ddb0;
      border: 1px solid rgba(240, 190, 80, 0.15);
      border-radius: 4px;
    }

    #title-panel {
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      text-align: center;
      white-space: nowrap;
    }
    #title-panel h1 {
      font-size: 15px;
      font-weight: normal;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    #year-panel {
      top: 70px;
      left: 30px;
      padding: 14px 22px;
    }
    #year-panel .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.55;
      margin-bottom: 4px;
    }
    #year-display {
      font-family: 'Times New Roman', Times, serif;
      font-variant-numeric: tabular-nums;
      font-size: 56px;
      font-weight: bold;
      letter-spacing: 4px;
      line-height: 1;
      color: #f5c842;
    }

    #count-panel {
      top: 70px;
      right: 30px;
      padding: 14px 22px;
      text-align: right;
    }
    #count-panel .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.55;
      margin-bottom: 4px;
    }
    #slave-number {
      font-family: 'Times New Roman', Times, serif;
      font-variant-numeric: tabular-nums;
      font-size: 44px;
      font-weight: bold;
      letter-spacing: 2px;
      line-height: 1;
      color: #e88040;
    }
    #count-panel .sublabel {
      font-size: 10px;
      opacity: 0.4;
      margin-top: 3px;
    }

    #chart-panel {
      top: 195px;
      left: 30px;
      padding: 10px 14px 12px;
    }
    #chart-panel .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.45;
      margin-bottom: 7px;
    }
    #chart-canvas {
      display: block;
    }

    /* ── Controls ── */
    #controls {
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #play-btn {
      background: rgba(245, 200, 66, 0.12);
      border: 1px solid rgba(245, 200, 66, 0.4);
      color: #f5c842;
      cursor: pointer;
      padding: 7px 22px;
      border-radius: 3px;
      font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      width: 110px;
      transition: background 0.15s;
    }
    #play-btn:hover { background: rgba(245, 200, 66, 0.22); }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .slider-group label {
      font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-variant-numeric: tabular-nums;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.5;
    }

    input[type=range] {
      cursor: pointer;
      accent-color: #f5c842;
      height: 4px;
    }
    #year-slider { width: 320px; }
    #speed-slider { width: 120px; }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: #0d0d14;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      color: #f0ddb0;
    }
    #loading p { font-size: 14px; letter-spacing: 2px; opacity: 0.6; }
    #loading .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(245,200,66,0.2);
      border-top-color: #f5c842;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tooltip ── */
    #tooltip {
      display: none;
      position: fixed;
      z-index: 1500;
      background: #111827;
      color: #f9fafb;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 12px 16px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      pointer-events: none;
      max-width: 260px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #tooltip .tt-vessel {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    #tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 3px;
    }
    #tooltip .tt-label {
      color: #9ca3af;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      flex-shrink: 0;
    }
    #tooltip .tt-val {
      color: #f9fafb;
      font-weight: 500;
      text-align: right;
    }
    #tooltip .tt-route {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: #d1d5db;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p>Loading voyages…</p>
  </div>

  <div id="map"></div>
  <canvas id="ship-canvas"></canvas>

  <div class="panel" id="title-panel">
    <h1>French Slave Voyages &nbsp;·&nbsp; 1710 – 1868</h1>
  </div>

  <div class="panel" id="year-panel">
    <div class="label">Year</div>
    <div id="year-display">—</div>
  </div>

  <div class="panel" id="chart-panel">
    <div class="label">Slaves embarked per year</div>
    <canvas id="chart-canvas"></canvas>
  </div>

  <div class="panel" id="count-panel">
    <div class="label">Slaves embarked</div>
    <div id="slave-number">0</div>
    <div class="sublabel">cumulative</div>
  </div>

  <div class="panel" id="controls">
    <button id="play-btn">⏸ Pause</button>
    <div class="slider-group">
      <label>Timeline</label>
      <input type="range" id="year-slider" min="0" max="10000" value="0">
    </div>
    <div class="slider-group">
      <label id="speed-label">Speed · 1.0×</label>
      <input type="range" id="speed-slider" min="1" max="30" value="15">
    </div>
  </div>

  <div id="tooltip"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
