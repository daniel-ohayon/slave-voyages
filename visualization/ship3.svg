<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <!-- main mast -->
  <line x1="100" y1="106" x2="100" y2="18" stroke="#4a3010" stroke-width="4" stroke-linecap="round"/>
  <!-- main lateen yard -->
  <line x1="56" y1="100" x2="188" y2="26" stroke="#4a3010" stroke-width="2.5" stroke-linecap="round"/>
  <!-- main lateen sail -->
  <path d="M 58,98 L 186,28 L 100,106 Z" fill="#f5ecd7" stroke="#c9b88f" stroke-width="1"/>
  <!-- mizzen mast -->
  <line x1="162" y1="106" x2="162" y2="54" stroke="#4a3010" stroke-width="3" stroke-linecap="round"/>
  <!-- mizzen lateen yard -->
  <line x1="144" y1="98" x2="196" y2="56" stroke="#4a3010" stroke-width="2" stroke-linecap="round"/>
  <!-- mizzen lateen sail -->
  <path d="M 146,96 L 194,58 L 162,106 Z" fill="#efe4c9" stroke="#c9b88f" stroke-width="1"/>
  <!-- hull: pale sun-bleached wood -->
  <path d="M 40,106 L 200,106 L 190,130 Q 118,144 52,130 Z" fill="#7a5535" stroke="#4a3010" stroke-width="1.5"/>
  <!-- hull stripe: muted brass -->
  <path d="M 44,113 Q 118,121 194,113" fill="none" stroke="#b8a87a" stroke-width="2"/>
</svg>
